<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Bakeoff 3</title>
		<link rel="stylesheet" type="text/css" href="CSS/main.css">
	</head>
	<body>
		<!-- You *may* edit the HTML this time. -->
		<div id="main">
			<div id="movieCards"></div>
			<form>
				<hr>
				<div id="genreFilters"></div>
				<div class="filter-row">
					<label for="durationFilter">Max runtime:</label>
					<input type="range" id="durationFilter" min="0" max="240" value="240" step="5"/>
					<output id="durationOutput">Any</output>

					<label>Start from:</label>
					<input type="range" id="startAfter" min="0" max="1440" value="0" step="30"/>
					<label>to:</label>
					<input type="range" id="startBefore" min="0" max="1440" value="1440" step="30"/>
					<output id="startRangeOutput">12:00 AM – 12:00 AM</output>
				</div>
				<div class="filter-row">
					<label for="userName">Your name:</label>
					<input type="text" id="userName"/>

					<label for="numberOfTickets">How many tickets?</label>
					<input type="number" id="numberOfTickets" min="1" max="200" value="1" style="width:4em"/>

					<input type="button" id="submit" value="Send" />
				</div>
			</form>
		</div>
	</body>
	<!-- The following line, "./js/framework.js", *will* be changed before the real Bakeoff. -->
	<script src="./js/framework.js"></script>
	<!-- Your js code should be loaded from local file: -->
	<script src="./js/main.js"></script>
</html>
